<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spiderman Game Center | Online Menu</title>
    <!-- Google Fonts: Bangers (Comic Style) & Roboto -->
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Spider-Web Background Overlay -->
    <div class="web-overlay"></div>

    <header>
        <div class="brand-container">
            <img src="Images/sgc_logo.png" alt="SGC Logo" class="brand-logo">
            <div class="logo-text">
                <h1 class="brand-name"><span class="spider-part">SPIDER</span><span class="man-part">MAN</span></h1>
                <p class="brand-subtitle">GAME CENTER</p>
            </div>
        </div>
        <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search your hunger...">
        </div>
        <div class="cart-icon" id="cartToggle">
            <i class="fas fa-shopping-basket"></i>
            <span id="cartCount">0</span>
        </div>
    </header>

    <!-- Hero Carousel -->
    <section class="hero-carousel">
        <div class="carousel-inner" id="heroCarousel">
            <!-- Images will be injected here via JS -->
        </div>
        <div class="hero-overlay">
            <div class="hero-content">
                <h1 class="hero-title"><span class="red-text">SPIDERMAN</span> GAME CENTER</h1>
                <p class="hero-subtitle">MASAKA, KIGALI</p>
                <button class="hero-btn">EAT • DRINK • PLAY</button>
            </div>
        </div>
    </section>

    <nav class="categories">
        <button class="filter-btn active" data-category="all">🕸️ ALL ITEMS</button>
        <button class="filter-btn" data-category="food">🍔 FOOD</button>
        <button class="filter-btn" data-category="drinks">🥤 DRINKS</button>
        <button class="filter-btn" data-category="kids">🧒 KIDS MENU</button>
        <button class="filter-btn" data-category="sides-dessert">🍟 SIDES & DESSERT</button>
    </nav>

    <main class="menu-grid" id="menuGrid">
        <!-- Items dynamically injected via JavaScript -->
    </main>

    <!-- Side Cart (Simulated Tray) -->
    <aside class="cart-tray" id="cartTray">
        <div class="tray-header">
            <h3>Your Selection</h3>
            <button id="closeCart">&times;</button>
        </div>
        <div class="tray-items" id="trayItems">
            <!-- Selected items here -->
            <p class="empty-msg">Your tray is empty.</p>
        </div>
        <div class="tray-footer">
            <div class="total">Total: <span id="totalPrice">0 FRW</span></div>
            <button class="order-btn">Level Up Your Hunger</button>
        </div>
    </aside>

    <footer>
        <div class="footer-container">
            <div class="footer-left">
                <div class="socials">
                    <i class="fab fa-whatsapp"></i>
                    <a href="https://www.instagram.com/spidermangamecenter?igsh=MWx0eHpqbXVsaTFjag==" target="_blank" rel="noopener noreferrer"><i class="fab fa-instagram"></i></a>
                    <a href="https://www.tiktok.com/@spidermangamecenter?_r=1&_t=ZS-95cEFirwpEO" target="_blank" rel="noopener noreferrer"><i class="fab fa-tiktok"></i></a>
                </div>
            </div>
            <div class="footer-center">
                <h3 class="footer-brand">Spiderman_Game_Center</h3>
                <p><i class="fas fa-map-marker-alt"></i> Located in Masaka, Kigali</p>
                <p class="footer-hours">Open Daily | Play Hard, Eat Better</p>
            </div>
            <div class="footer-right">
                <!-- Spacer for balance -->
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
